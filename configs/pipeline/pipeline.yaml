default_args: ["configs/_modular/sample_generation.yaml", "configs/_modular/model.yaml", "configs/_modular/grouping.yaml", "configs/_modular/dataset_test.yaml"]

############ modification of default args
model:
  spatial_shape: [500, 500, 1000]

############ non-default args
forest_path: 'data/benchmark/L1W_voxelized01_for_eval.laz' # quick eval-subset path; for the doc-faithful full-L1W pipeline use data/pipeline/L1W/forest/L1W.laz
pretrain: 'data/model_weights/epoch_781.pth'
fp16: True
tile_generation: True # 保持 True，让它重新切

dataloader:
  batch_size: 1
  num_workers: 2

shape_cfg:
  outer_remove: ~
  alpha: 0.6 # 与原作者推荐一致，更适合非凸边界
  buffer_size_to_determine_edge_trees: 0.3

save_cfg:
  save_formats: ['laz']
  save_treewise: True
  save_pointwise: True
  return_type: 'original'
  results_dir: 'results'
