model:
  kernel_size: 3 # kernel size of convolution layers
  channels: 32 # channel size of first convolution layer
  num_blocks: 7 # number of blocks to be used in the Unet or Lnet
  use_feats: False # whether to use precomputed features as network input or not (default is False)
  use_coords: False # whether to use the coordinates as network input or not. Coords are redundant since relativ position defined by voxel grid (default is False)
  dim_coord: 3 # dimension of coordinates (not used if use_coords is False)
  dim_feat: 1 # dimension of precomputed features (not used if use_feats is False)
  max_num_points_per_voxel: 3 # maximum number of points within a voxel to use for feature averaging (technical detail, not that important)
  fixed_modules: [] # modules whose parameters are not updated during training
  spatial_shape: ~ # spatial shape of the tiles/crops (technical detail, not that important).
  voxel_size: 0.1 # determines the voxel size in m for generating the sparse voxel grid
  use_geometry_constraint: True
  use_boundary_push_constraint: True
  boundary_push_weight: 0.35 # strong enough to influence clustering boundaries without overwhelming the offset regression
  boundary_push_warmup_epochs: 15 # longer warmup keeps the stronger cross-tree repulsion from disrupting the pretrained geometric prior
  boundary_push_xy_radius: 1.2 # widen boundary competitor mining so adjacent crowns are more likely to contribute hard negatives
  boundary_push_z_radius: 3.0 # allow vertically offset but still interacting crown points to participate in the push term
  boundary_push_margin: 0.8 # enforce a more meaningful separation than the clustering radius, so repulsion remains active beyond trivial cases
  boundary_push_max_anchors: 512 # sample more anchors per crop so boundary-rich regions are less likely to be missed
  boundary_push_max_negatives: 12 # keep more hard negatives per anchor to strengthen repulsion at canopy intersections
