grouping: # see paper for details on these hyperparameters
  tree_class_in_dataset: 0 # semantic class index that should be treated as tree during clustering
  tree_conf_thresh: 0.45 # slightly relaxed for mixed MLS pretraining with TLS/UAV fine-tuning
  tau_vert: 0.35 # keep geometric seeds, but do not over-filter sparse/occluded TLS/UAV canopy points
  tau_off: 6.0 # allow taller crowns and noisier z-offsets than the original MLS-oriented threshold
  tau_group: 0.12 # fallback DBSCAN radius; HDBSCAN remains the default
  tau_min: 35 # lower the minimum cluster size to reduce misses on small/partially occluded trees
  use_hdbscan: True # use hdbscan instead of dbscan for flexible clustering based on one hyperparameter only (tau_min) instead of two for dbscan (tau_min, tau_group)
