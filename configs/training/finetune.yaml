# 微调配置：在已有 checkpoint 上继续训练（只加载模型权重，不恢复 optimizer/epoch）
# 用法：先改下面 pretrain 为你的 checkpoint 路径，再运行
#   python tools/training/train.py --config configs/training/finetune.yaml
default_args: ["configs/_modular/model.yaml", "configs/_modular/dataset_train.yaml", "configs/_modular/dataset_test.yaml"]

############ modification default args
model:
  spatial_shape: [500, 500, 1000]
  # 只微调头时取消下面注释，冻结 backbone
  # fixed_modules: ['input_conv', 'unet']

############ non-default args
dataloader:
  train:
    batch_size: 2
    num_workers: 2
  test:
    batch_size: 1
    num_workers: 1

optimizer:
  type: 'AdamW'
  lr: 0.0003   # 微调时用较小学习率（默认训练为 0.003）
  weight_decay: 0.001

scheduler:
  t_initial: 500   # 可适当缩短
  lr_min: 0.00001
  cycle_decay: 1
  warmup_lr_init: 0.00001
  warmup_t: 20
  cycle_limit: 1
  t_in_epochs: True

epochs: 200        # 微调轮数
examples_per_epoch: 500
fp16: True
# 重要：指向要微调的 TreeLearn checkpoint（只加载模型，不恢复 optimizer/epoch）
pretrain: 'work_dirs/train/epoch_180.pth'
grad_norm_clip: True

save_frequency: 20
validation_frequency: 20
